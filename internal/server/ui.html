<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>lidarr-metadata-provider</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 32 32%27%3E%3Crect width=%2732%27 height=%2732%27 rx=%277%27 fill=%27%23111114%27/%3E%3Ccircle cx=%2716%27 cy=%2716%27 r=%279%27 fill=%27none%27 stroke=%27%23d8964a%27 stroke-width=%272%27/%3E%3Ccircle cx=%2716%27 cy=%2716%27 r=%272.5%27 fill=%27%23d8964a%27/%3E%3C/svg%3E">
<style>
  /* One scale for size, one for space, one accent. Values are deliberate,
     not nudged: no half-pixel sizes, no weights between the three below. */
  :root {
    color-scheme: light dark;

    --bg: #faf9f7;
    --panel: #ffffff;
    --sunk: #f2f0ec;
    --line: #e0ddd6;
    --line-strong: #c9c5bb;
    --ink: #1a1815;
    --muted: #6b665d;

    /* Amber rather than the blue every dev tool reaches for. Used only for
       brand, the primary action, focus, and the active tab. */
    --accent: #a8621c;
    --accent-ink: #ffffff;
    --accent-soft: rgba(168, 98, 28, 0.10);

    --ok: #2c6e49;
    --ok-soft: rgba(44, 110, 73, 0.12);
    --alert: #a4303f;
    --alert-soft: rgba(164, 48, 63, 0.10);
    --cloud: #5a5750;

    --fs-display: 30px;
    --fs-h1: 17px;
    --fs-h2: 15px;
    --fs-body: 14px;
    --fs-small: 12px;
    --fs-micro: 11px;

    --r-sm: 4px;
    --r-md: 6px;
    --shadow: 0 1px 2px rgba(26, 24, 21, .06), 0 2px 8px rgba(26, 24, 21, .04);
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
    --wide: 1360px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #100f0d;
      --panel: #1a1917;
      --sunk: #141311;
      --line: #2e2c28;
      --line-strong: #45423c;
      --ink: #efece6;
      --muted: #9b958a;

      --accent: #d8964a;
      --accent-ink: #17150f;
      --accent-soft: rgba(216, 150, 74, 0.14);

      --ok: #63c48d;
      --ok-soft: rgba(99, 196, 141, 0.14);
      --alert: #e8747f;
      --alert-soft: rgba(232, 116, 127, 0.14);
      --cloud: #a09a8e;
      --shadow: 0 1px 2px rgba(0, 0, 0, .5), 0 2px 10px rgba(0, 0, 0, .35);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: var(--fs-body)/1.55 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: var(--wide); margin: 0 auto; padding: 0 24px; }

  /* Header. The mark and wordmark align with the content below, which they
     did not before: the header spanned the full viewport while main was
     centred, so they diverged on wide monitors. */
  header {
    border-bottom: 1px solid var(--line); background: var(--panel);
    position: sticky; top: 0; z-index: 5;
  }
  header .wrap { display: flex; align-items: center; gap: 20px; height: 56px; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand svg { display: block; }
  .brand h1 {
    font-size: var(--fs-h1); margin: 0; font-weight: 600; letter-spacing: -0.015em;
  }
  .brand .ver {
    font: 500 var(--fs-micro)/1 var(--mono); color: var(--muted);
    border: 1px solid var(--line); border-radius: 99px; padding: 3px 7px;
  }

  [role=tablist] { display: flex; gap: 2px; margin-left: 8px; }
  [role=tab] {
    font: inherit; font-size: var(--fs-body); font-weight: 500; padding: 6px 12px;
    border: 0; border-radius: var(--r-sm); background: none; color: var(--muted); cursor: pointer;
  }
  [role=tab]:hover { color: var(--ink); }
  [role=tab][aria-selected=true] { background: var(--accent-soft); color: var(--accent); font-weight: 600; }

  /* Status reads as a state, not as a sentence in the corner. */
  .status { margin-left: auto; display: flex; align-items: center; gap: 8px; font-size: var(--fs-small); color: var(--muted); }
  .dot { width: 8px; height: 8px; border-radius: 99px; background: var(--muted); flex: none; }
  .dot.live { background: var(--ok); box-shadow: 0 0 0 3px var(--ok-soft); }
  .dot.local { background: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

  main { padding: 24px 0 64px; }
  [role=tabpanel][hidden] { display: none; }

  /* Micro labels are uppercase and tracked, which separates label from value
     without another font size. */
  .lbl {
    font-size: var(--fs-micro); font-weight: 600; letter-spacing: 0.07em;
    text-transform: uppercase; color: var(--muted);
  }

  form {
    display: grid; gap: 12px; background: var(--panel); padding: 16px;
    border: 1px solid var(--line); border-radius: var(--r-md); box-shadow: var(--shadow);
    grid-template-columns: 170px minmax(220px, 1fr) auto auto; align-items: end;
  }
  form.with-artist { grid-template-columns: 170px minmax(220px, 1fr) minmax(0, 220px) auto auto; }
  form:not(.with-artist) #l-artist { display: none; }
  @media (max-width: 900px) { form, form.with-artist { grid-template-columns: 1fr; } }
  label { display: grid; gap: 6px; }
  select, input[type=text] {
    font: inherit; padding: 8px 10px; border-radius: var(--r-sm); width: 100%; min-width: 0;
    border: 1px solid var(--line-strong); background: var(--bg); color: var(--ink);
  }
  select:hover, input[type=text]:hover { border-color: var(--muted); }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  button.go {
    font: inherit; font-weight: 600; padding: 9px 20px; border-radius: var(--r-sm);
    border: 1px solid transparent; background: var(--accent); color: var(--accent-ink); cursor: pointer;
  }
  button.go:hover { filter: brightness(1.08); }
  button.go:disabled { opacity: .5; cursor: progress; filter: none; }
  .check { display: flex; align-items: center; gap: 8px; font-size: var(--fs-body); white-space: nowrap; padding-bottom: 8px; }

  .panel {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: var(--r-md); box-shadow: var(--shadow);
  }

  /* Idle state. The console used to open on one grey sentence over an empty
     screen, which reads as a component that failed to render. */
  .idle { margin-top: 24px; display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
  .idle .panel { padding: 18px; }
  .idle h2 { margin: 0 0 14px; font-size: var(--fs-h2); font-weight: 600; }
  .facts { display: grid; gap: 14px; grid-template-columns: 1fr 1fr; }
  .fact { display: grid; gap: 3px; }
  .fact .v { font-size: var(--fs-body); font-variant-numeric: tabular-nums; }
  .fact .v.big { font-size: var(--fs-display); font-weight: 600; letter-spacing: -0.02em; line-height: 1.1; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    font: inherit; font-size: var(--fs-small); padding: 6px 11px; cursor: pointer;
    border: 1px solid var(--line-strong); border-radius: 99px;
    background: var(--bg); color: var(--ink);
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }

  .verdict {
    margin-top: 24px; padding: 15px 18px; border-radius: var(--r-md);
    border: 1px solid var(--line); border-left: 3px solid var(--muted); background: var(--panel);
    box-shadow: var(--shadow); display: flex; align-items: baseline; gap: 18px; flex-wrap: wrap;
  }
  .verdict.good { border-left-color: var(--ok); }
  .verdict.warn { border-left-color: var(--accent); }
  .verdict.bad { border-left-color: var(--alert); }
  .verdict strong { font-size: var(--fs-h2); font-weight: 600; }
  .verdict .stat { font-size: var(--fs-small); color: var(--muted); }
  .verdict .stat b { color: var(--ink); font-weight: 600; font-variant-numeric: tabular-nums; }

  table.scoreboard { width: 100%; border-collapse: collapse; margin-top: 16px; }
  .scoreboard th, .scoreboard td { padding: 10px 16px; text-align: right; font-size: var(--fs-body); }
  .scoreboard thead th { background: var(--sunk); border-bottom: 1px solid var(--line); }
  .scoreboard thead th:not(:first-child) { text-align: right; }
  .scoreboard th[scope=row] { text-align: left; color: var(--muted); font-weight: 500; }
  .scoreboard thead th:first-child { text-align: left; }
  .scoreboard td { font-family: var(--mono); font-variant-numeric: tabular-nums; }
  .scoreboard tbody tr + tr th, .scoreboard tbody tr + tr td { border-top: 1px solid var(--line); }
  .delta { font-weight: 600; }
  .delta.good { color: var(--ok); }
  .delta.bad { color: var(--alert); }
  .delta.flat { color: var(--muted); font-weight: 500; }

  .panes { display: grid; gap: 16px; margin-top: 16px; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); }
  .pane { overflow: hidden; }
  .pane > h2 { margin: 0; padding: 16px 18px 2px; font-size: var(--fs-h2); font-weight: 600; }
  .pane .origin { padding: 0 18px 14px; font-size: var(--fs-small); color: var(--muted); }
  .pane .bar {
    padding: 10px 18px; background: var(--sunk);
    border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    font: 500 var(--fs-small)/1 var(--mono); color: var(--muted);
  }

  /* One chip pattern for every status, filled rather than outlined so the
     colour actually registers. */
  .tag {
    font-size: var(--fs-micro); font-weight: 600; padding: 3px 8px; border-radius: var(--r-sm);
    background: var(--sunk); color: var(--muted); letter-spacing: 0.02em; white-space: nowrap;
  }
  .tag.ok { background: var(--ok-soft); color: var(--ok); }
  .tag.bad { background: var(--alert-soft); color: var(--alert); }
  .tag.warn { background: var(--accent-soft); color: var(--accent); }

  .items { list-style: none; margin: 0; padding: 0; max-height: 440px; overflow: auto; }
  .items li { padding: 12px 18px; border-bottom: 1px solid var(--line); display: grid; gap: 5px; }
  .items li:last-child { border-bottom: 0; }
  .row1 { display: flex; gap: 10px; align-items: baseline; flex-wrap: wrap; }
  .row1 strong { font-weight: 600; }
  .row1 .sub { color: var(--muted); font-size: var(--fs-small); }
  .row2 { color: var(--muted); font-size: var(--fs-small); display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  code.mbid { font: var(--fs-micro)/1 var(--mono); color: var(--muted); }

  .empty, .error { padding: 18px; color: var(--muted); font-size: var(--fs-body); }
  .error { color: var(--alert); white-space: pre-wrap; }
  details { border-top: 1px solid var(--line); }
  details > summary { padding: 10px 18px; cursor: pointer; font-size: var(--fs-small); color: var(--muted); user-select: none; }
  details pre {
    margin: 0; padding: 14px 18px; background: var(--sunk); overflow: auto; max-height: 380px;
    font: var(--fs-micro)/1.6 var(--mono);
  }
  .issues { padding: 12px 18px; border-top: 1px solid var(--line); font-size: var(--fs-small); color: var(--ink); }
  .issues ul { margin: 6px 0 0; padding-left: 18px; color: var(--muted); }

  .cards { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
  .card { padding: 18px; }
  .card h2 { margin: 0 0 14px; font-size: var(--fs-h2); font-weight: 600; }
  .stats { display: flex; gap: 32px; flex-wrap: wrap; }
  .banner {
    padding: 14px 18px; border-radius: var(--r-md); border: 1px solid var(--line);
    border-left: 3px solid var(--accent); background: var(--panel); box-shadow: var(--shadow);
    font-size: var(--fs-body); margin-bottom: 20px;
  }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="brand">
      <svg width="22" height="22" viewBox="0 0 32 32" aria-hidden="true">
        <circle cx="16" cy="16" r="12" fill="none" stroke="var(--accent)" stroke-width="2.5"/>
        <circle cx="16" cy="16" r="3.5" fill="var(--accent)"/>
      </svg>
      <h1>Metadata Provider</h1>
      <span class="ver" id="version">-</span>
    </div>
    <div role="tablist" aria-label="Views">
      <button role="tab" id="tab-search" aria-controls="panel-search" aria-selected="true">Search</button>
      <button role="tab" id="tab-db" aria-controls="panel-db" aria-selected="false">Database</button>
    </div>
    <div class="status">
      <span class="dot" id="status-dot"></span>
      <span id="status-text">checking</span>
    </div>
  </div>
</header>

<main class="wrap">
  <section role="tabpanel" id="panel-search" aria-labelledby="tab-search">
    <form id="f">
      <label><span class="lbl">Look up</span>
        <select id="mode">
          <option value="artist">Artists</option>
          <option value="album">Albums</option>
          <option value="all">Everything</option>
          <option value="artist-id">Artist by ID</option>
          <option value="album-id">Album by ID</option>
        </select>
      </label>
      <label id="l-query"><span class="lbl" id="query-label">Search for</span>
        <input type="text" id="query" placeholder="radiohead" autocomplete="off" autofocus>
      </label>
      <label id="l-artist"><span class="lbl">Artist</span>
        <input type="text" id="artist" placeholder="Optional" autocomplete="off">
      </label>
      <span class="check"><input type="checkbox" id="compare" checked> Compare with official service</span>
      <button type="submit" class="go" id="go">Search</button>
    </form>
    <div id="out" aria-live="polite" aria-busy="false"></div>
  </section>

  <section role="tabpanel" id="panel-db" aria-labelledby="tab-db" hidden>
    <div id="db"></div>
  </section>
</main>

<script>
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

function ms(v) { return v >= 1000 ? (v / 1000).toFixed(2) + " s" : Math.round(v) + " ms"; }
function bytes(v) {
  if (v < 1024) return v + " B";
  if (v < 1048576) return (v / 1024).toFixed(1) + " KB";
  return (v / 1048576).toFixed(2) + " MB";
}
function num(v) { return (v ?? 0).toLocaleString(); }

/* Tabs. Arrow keys move between them and only the active tab is in the tab
   order, which is what the tablist role promises a screen reader. */
const TABS = [["tab-search", "panel-search"], ["tab-db", "panel-db"]];

function selectTab(tab, focus) {
  for (const [t, p] of TABS) {
    const on = t === tab;
    $(t).setAttribute("aria-selected", String(on));
    $(t).tabIndex = on ? 0 : -1;
    $(p).hidden = !on;
  }
  if (focus) $(tab).focus();
  if (tab === "tab-db") loadDatabase();
}

TABS.forEach(([tab], i) => {
  $(tab).tabIndex = i === 0 ? 0 : -1;
  $(tab).addEventListener("click", () => selectTab(tab));
  $(tab).addEventListener("keydown", (e) => {
    const step = { ArrowRight: 1, ArrowLeft: -1, Home: -i, End: TABS.length - 1 - i }[e.key];
    if (step === undefined) return;
    e.preventDefault();
    selectTab(TABS[(i + step + TABS.length) % TABS.length][0], true);
  });
});

function syncFields() {
  const mode = $("mode").value;
  $("f").classList.toggle("with-artist", mode === "album");
  const byId = mode.endsWith("-id");
  $("query-label").textContent = byId ? "MusicBrainz ID" : "Search for";
  $("query").placeholder = byId ? "b10bbbfc-cf9e-42e0-be17-e2c3e1d2600d" : "radiohead";
}
$("mode").addEventListener("change", syncFields);
syncFields();

let liveLookups = false;
let lastStatus = null;

async function refreshPill() {
  try {
    const s = await (await fetch("/ui/status")).json();
    lastStatus = s;
    liveLookups = !!(s.fallback && s.fallback.enabled);
    $("version").textContent = s.version || "-";

    const local = s.dataset && s.dataset.present;
    $("status-dot").className = "dot " + (local ? "local" : liveLookups ? "live" : "");
    $("status-text").textContent = local
      ? (liveLookups ? "Local database, live lookups on" : "Local database")
      : liveLookups ? "Live lookups only" : "No source";
  } catch (e) {
    $("status-dot").className = "dot";
    $("status-text").textContent = "unreachable";
  }
}

/* ---- Search ---- */
function deltaCell(localV, officialV, betterIsLower) {
  if (!localV || !officialV) return `<td class="delta flat">n/a</td>`;
  const ratio = betterIsLower ? officialV / localV : localV / officialV;
  if (ratio >= 0.95 && ratio <= 1.05) return `<td class="delta flat">about the same</td>`;
  const better = ratio > 1;
  const factor = better ? ratio : 1 / ratio;
  const word = betterIsLower ? (better ? "faster" : "slower") : (better ? "larger" : "smaller");
  return `<td class="delta ${better ? "good" : "bad"}">${factor.toFixed(1)}x ${word}</td>`;
}

function scoreboard(local, official) {
  const failed = local.error || official.error;
  const sizeDelta = (!local.bytes || !official.bytes) ? `<td class="delta flat">n/a</td>`
    : (() => {
        const ratio = official.bytes / local.bytes;
        if (ratio >= 0.95 && ratio <= 1.05) return `<td class="delta flat">about the same</td>`;
        const smaller = ratio > 1;
        const f = smaller ? ratio : 1 / ratio;
        return `<td class="delta ${smaller ? "good" : "bad"}">${f.toFixed(1)}x ${smaller ? "smaller" : "larger"}</td>`;
      })();
  const countDelta = local.count === official.count
    ? `<td class="delta flat">same</td>`
    : `<td class="delta flat">${local.count > official.count ? "+" : ""}${local.count - official.count}</td>`;

  return `<table class="scoreboard">
    <thead><tr><th scope="col"></th><th scope="col">${esc(local.label)}</th>
      <th scope="col">${esc(official.label)}</th><th scope="col">Difference</th></tr></thead>
    <tbody>
      <tr><th scope="row">Response time</th><td>${ms(local.tookMs)}</td><td>${ms(official.tookMs)}</td>
        ${failed ? `<td class="delta flat">n/a</td>` : deltaCell(local.tookMs, official.tookMs, true)}</tr>
      <tr><th scope="row">Response size</th><td>${bytes(local.bytes)}</td><td>${bytes(official.bytes)}</td>
        ${failed ? `<td class="delta flat">n/a</td>` : sizeDelta}</tr>
      <tr><th scope="row">Results</th><td>${local.count}</td><td>${official.count}</td>
        ${failed ? `<td class="delta flat">n/a</td>` : countDelta}</tr>
    </tbody></table>`;
}

const profileHelp = "Lidarr's default profile keeps only studio albums with an official release. "
  + "If you changed your profile in Lidarr, your number will differ.";

function renderItems(items) {
  if (!items || !items.length) return `<p class="empty">No results</p>`;
  return `<ul class="items">` + items.map((it) => {
    let shown = "";
    if (it.kind === "artist" && it.hasAlbums) {
      shown = `<span class="shown ${it.visible === 0 ? "none" : ""}" title="${esc(profileHelp)}">`
        + `${it.visible} of ${it.albums} albums shown in Lidarr</span>`;
    }
    return `<li>
      <div class="row1">
        <strong>${esc(it.title) || "(untitled)"}</strong>
        ${it.subtitle ? `<span class="sub">${esc(it.subtitle)}</span>` : ""}
        ${it.type ? `<span class="tag">${esc(it.type)}</span>` : ""}
      </div>
      <div class="row2">
        <code class="mbid">${esc(it.id)}</code>
        ${shown}${it.detail ? `<span>${esc(it.detail)}</span>` : ""}
        ${it.severe ? `<span class="severe">${esc(it.severeReason)}</span>` : ""}
      </div>
    </li>`;
  }).join("") + `</ul>`;
}

function renderPane(r, kind) {
  const badge = r.error ? `<span class="tag bad">Error</span>`
    : r.formatOk ? `<span class="tag ok">Lidarr can read this</span>`
    : `<span class="tag bad">Lidarr may reject this (${r.formatIssues.length})</span>`;
  return `<section class="panel pane ${kind}">
    <h2>${esc(r.label)}</h2>
    <p class="origin">${esc(r.origin)}</p>
    <div class="bar">${badge}
      <span>${r.count} result${r.count === 1 ? "" : "s"}</span>
      <span>${ms(r.tookMs)}</span><span>${bytes(r.bytes)}</span></div>
    ${r.error ? `<p class="error">${esc(r.error)}</p>` : renderItems(r.items)}
    ${(!r.error && !r.formatOk) ? `<div class="issues">Fields Lidarr may not read correctly:
      <ul>${r.formatIssues.map((d) => `<li>${esc(d)}</li>`).join("")}</ul></div>` : ""}
    <details><summary>Raw response</summary><pre>${esc(JSON.stringify(r.raw, null, 2))}</pre></details>
  </section>`;
}

const EXAMPLES = ["radiohead", "the beatles", "bjork", "aphex twin", "johann sebastian bach"];

// Shown on load and whenever there is nothing else to show. Every self hosted
// tool worth trusting proves it is alive before you interact with it.
function renderIdle() {
  const ds = (lastStatus && lastStatus.dataset) || {};
  const m = (lastStatus && lastStatus.metrics) || {};

  const contents = ds.present
    ? `<div class="facts">
         <div class="fact"><span class="lbl">Artists</span><span class="v big">${num(ds.artists)}</span></div>
         <div class="fact"><span class="lbl">Albums</span><span class="v big">${num(ds.albums)}</span></div>
       </div>`
    : `<p class="empty" style="padding:0">No local database. Requests are answered by live
       MusicBrainz lookups, which are slower and paced at one per second.</p>`;

  $("out").innerHTML = `<div class="idle">
    <section class="panel">
      <h2>Database</h2>
      ${contents}
      <div class="facts" style="margin-top:14px">
        <div class="fact"><span class="lbl">Snapshot</span><span class="v">${esc(ds.exportTimestamp ? dateText(ds.exportTimestamp) : "none")}</span></div>
        <div class="fact"><span class="lbl">Served</span><span class="v">${num(m.requests)} requests</span></div>
      </div>
    </section>
    <section class="panel">
      <h2>Try a search</h2>
      <div class="chips">${EXAMPLES.map((q) =>
        `<button type="button" class="chip" data-q="${esc(q)}">${esc(q)}</button>`).join("")}</div>
      <p style="margin:16px 0 0;font-size:var(--fs-small);color:var(--muted)">Each search runs against this
        server and the official service at the same time, so you can see where they differ.</p>
    </section>
  </div>`;

  for (const b of $("out").querySelectorAll(".chip")) {
    b.addEventListener("click", () => {
      $("mode").value = "artist"; syncFields();
      $("query").value = b.dataset.q;
      $("f").requestSubmit();
    });
  }
}

$("f").addEventListener("submit", async (e) => {
  e.preventDefault();
  const q = $("query").value.trim();
  if (!q) return;
  $("go").disabled = true;
  $("out").setAttribute("aria-busy", "true");
  $("out").innerHTML = `<div class="verdict"><strong>Searching</strong>${liveLookups
    ? `<span class="stat">Live lookups are paced to one per second, so this can take a few seconds</span>` : ""}</div>`;

  const params = new URLSearchParams({
    mode: $("mode").value, query: q, artist: $("artist").value.trim(),
    compare: $("compare").checked ? "1" : "0",
  });
  try {
    const d = await (await fetch("/ui/query?" + params)).json();
    let html = "";
    if (d.verdict) {
      html += `<div class="verdict ${d.verdict.status}"><strong>${esc(d.verdict.text)}</strong>`
        + (d.verdict.speed ? `<span class="stat">Speed <b>${esc(d.verdict.speed)}</b></span>` : "")
        + (d.verdict.size ? `<span class="stat">Size <b>${esc(d.verdict.size)}</b></span>` : "")
        + `</div>`;
    }
    if (d.official) html += scoreboard(d.local, d.official);
    html += `<div class="panes">` + renderPane(d.local, "local")
      + (d.official ? renderPane(d.official, "official") : "") + `</div>`;
    $("out").innerHTML = html;
  } catch (err) {
    $("out").innerHTML = `<section class="panel pane"><p class="error">${esc(err)}</p></section>`;
  } finally {
    $("go").disabled = false;
    $("out").setAttribute("aria-busy", "false");
    refreshPill();
  }
});

refreshPill().then(renderIdle);

/* ---- Database ---- */
function ago(iso) {
  if (!iso) return null;
  const days = Math.floor((Date.now() - new Date(iso)) / 86400000);
  if (days <= 0) return "today";
  return days === 1 ? "1 day ago" : days + " days ago";
}
function dateText(iso) {
  if (!iso) return "Not recorded";
  const d = new Date(iso);
  const rel = ago(iso);
  return d.toLocaleDateString(undefined, { day: "numeric", month: "short", year: "numeric" })
    + (rel ? ` (${rel})` : "");
}

async function loadDatabase() {
  $("db").innerHTML = `<p class="placeholder">Loading</p>`;
  let s;
  try { s = await (await fetch("/ui/status")).json(); }
  catch (e) { $("db").innerHTML = `<p class="error">${esc(e)}</p>`; return; }

  const ds = s.dataset || {}, m = s.metrics || {}, fb = s.fallback || {};
  // Worded so it never reads as a setup chore. A released build downloads its
  // database on first start, so this state means a development build, not
  // something the operator forgot to do.
  const banner = ds.present ? "" :
    `<div class="banner">This is a development build with no local database, so every request
     is answered by a live MusicBrainz lookup. That is slower and paced at one request per
     second. Released builds download their database on first start, with nothing to set up.</div>`;

  const counts = ds.present
    ? `<div class="stats">
        <div class="stat-big"><span class="n">${num(ds.artists)}</span><span class="l">Artists</span></div>
        <div class="stat-big"><span class="n">${num(ds.albums)}</span><span class="l">Albums</span></div>
        <div class="stat-big"><span class="n">${num(ds.tracks)}</span><span class="l">Tracks</span></div>
      </div>`
    : `<p class="empty">Counts appear once a local database is installed.</p>`;

  const fallbackCard = fb.enabled
    ? `<div class="pairs">
        <div class="pair"><span class="k">Status</span><span class="v">On</span></div>
        <div class="pair"><span class="k">Paced at</span><span class="v">1 request every ${esc(fb.pacedEvery || "-")}</span></div>
        <div class="pair"><span class="k">Lookups made</span><span class="v">${num(fb.lookups)}</span></div>
        <div class="pair"><span class="k">Waiting in queue</span><span class="v">${num(fb.queued)}</span></div>
      </div>`
    : `<p class="empty">Off. Every request is answered locally and nothing leaves this machine
       while serving.</p>`;

  $("db").innerHTML = banner + `<div class="cards">
    <section class="panel card"><h2>Database</h2><div class="pairs">
      <div class="pair"><span class="k">MusicBrainz snapshot</span><span class="v">${esc(ds.exportTimestamp ? dateText(ds.exportTimestamp) : "None installed")}</span></div>
      <div class="pair"><span class="k">Installed here</span><span class="v">${esc(ds.installedAt ? dateText(ds.installedAt) : "Not installed")}</span></div>
      <div class="pair"><span class="k">Next update check</span><span class="v">${esc(ds.nextCheck ? dateText(ds.nextCheck) : "Manual updates only")}</span></div>
      <div class="pair"><span class="k">Server version</span><span class="v">${esc(s.version || "-")}</span></div>
    </div></section>

    <section class="panel card"><h2>Contents</h2>${counts}</section>

    <section class="panel card"><h2>Live MusicBrainz lookups</h2>${fallbackCard}</section>

    <section class="panel card"><h2>Serving</h2><div class="pairs">
      <div class="pair"><span class="k">Requests served</span><span class="v">${num(m.requests)}</span></div>
      <div class="pair"><span class="k">Errors</span><span class="v">${num(m.errors)}</span></div>
      <div class="pair"><span class="k">Median response</span><span class="v">${ms(m.medianMs || 0)}</span></div>
      <div class="pair"><span class="k">Slowest 5%</span><span class="v">${ms(m.p95Ms || 0)}</span></div>
    </div>
    ${(m.routes && m.routes.length) ? `<table class="scoreboard" style="margin-top:14px">
      <thead><tr><th scope="col">Route</th><th scope="col">Requests</th><th scope="col">Average</th><th scope="col">Slowest</th></tr></thead>
      <tbody>${m.routes.map((r) => `<tr><th scope="row"><code class="mbid">${esc(r.route)}</code></th>
        <td>${num(r.count)}</td><td>${ms(r.averageMs)}</td><td>${ms(r.slowestMs)}</td></tr>`).join("")}</tbody>
    </table>` : `<p class="empty">No requests served yet.</p>`}
    </section>
  </div>`;
}
</script>
</body>
</html>
