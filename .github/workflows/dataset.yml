# Builds the dataset artifact users download, on a schedule, unattended.
#
# This workflow is the answer to "does depending on this project make its
# maintainer a bottleneck". Nobody produces these by hand: MusicBrainz
# publishes a full export twice a week, this runs after each one, and the
# result is attached to a release with its checksum.
name: dataset

on:
  # MusicBrainz exports land Wednesday and Saturday around 00:20 UTC. Running
  # well after gives the mirror time to finish publishing, and the offset keeps
  # this off the top of the hour, when every other scheduled job on the planet
  # fires. The schedule only polls; the expensive build runs only when the
  # check job finds an export newer than the latest release (see below), so a
  # run on an unchanged export costs seconds, not an hour.
  schedule:
    - cron: "37 6 * * 3,6"
  workflow_dispatch:
    inputs:
      export:
        description: "Export stamp to build, for example 20260718-002132. Defaults to the latest."
        required: false
      publish:
        description: "Attach the result to a release"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  # Polls the export mirror and decides whether a build is warranted. This is
  # the answer to "watch the dump location instead of building on a blind
  # cron": MusicBrainz has no webhook, so the schedule polls, but it fetches a
  # one line LATEST file and only lets the build proceed when that export has
  # no release yet. A manual dispatch always builds.
  check:
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.decide.outputs.build }}
      stamp: ${{ steps.decide.outputs.stamp }}
      tag: ${{ steps.decide.outputs.tag }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - id: decide
        run: |
          set -euo pipefail
          BASE=https://data.metabrainz.org/pub/musicbrainz/data/fullexport
          UA="LidarrMetadataProvider/ci ( https://github.com/${{ github.repository }} )"
          STAMP="${{ inputs.export }}"
          if [ -z "$STAMP" ]; then
            STAMP=$(curl -fsS -A "$UA" --retry 3 --retry-delay 5 --connect-timeout 30 "$BASE/LATEST" | tr -d '\n')
          fi
          # The release is tagged by the export's date, matching what is
          # already published; the time suffix is dropped so a re-published
          # export does not fork the tag.
          TAG="dataset-${STAMP%%-*}"
          echo "stamp=$STAMP" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch: building $STAMP"
          elif gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "$TAG already released; nothing to do"
          else
            echo "build=true" >> "$GITHUB_OUTPUT"
            echo "New export $STAMP has no release; building"
          fi

  build:
    needs: check
    if: needs.check.outputs.build == 'true'
    runs-on: ubuntu-latest
    # A cold-cache run on 4 slower vCPUs (download + cold enrichment + build +
    # 8.8 GB upload) can approach five hours; the job cap is six. Give it real
    # headroom rather than a number that today's export barely fits under and
    # next quarter's larger one will not.
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      # A standard runner starts with ~21-29 GB free, but the build's peak
      # simultaneous footprint is larger than that low end: the two archives
      # (~7.5 GB) stay on disk for the whole build, alongside the staging DB
      # (~7.9 GB) and the growing output (~8.8 GB), and then VACUUM in Finish()
      # needs up to twice the database size in scratch. A thorough reclaim gets
      # to ~45-50 GB, which fits with real margin; the previous hand-rolled
      # rm -rf list did not.
      - name: Reclaim disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false # leaving the Go toolchain in place; setup-go runs next
          large-packages: true
          docker-images: true
          swap-storage: false

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # bzip2 stores independent blocks, so decompression parallelises. The
      # single threaded decoder is the slowest part of a build by a wide
      # margin, and the pipeline picks this up automatically when present.
      - name: Install lbzip2
        run: sudo apt-get install -y lbzip2

      - name: Build tools
        run: |
          go build -o bin/pipeline ./cmd/pipeline
          go build -o bin/enrich ./cmd/enrich

      # The biography cache persists between runs so a build only fetches
      # articles that are new or changed, rather than all ~190k every time.
      - name: Restore enrichment cache
        uses: actions/cache@v4
        with:
          path: enrich
          key: enrich-${{ github.run_id }}
          restore-keys: enrich-

      - name: Resolve export
        id: export
        run: |
          set -euo pipefail
          STAMP="${{ needs.check.outputs.stamp }}"
          BASE=https://data.metabrainz.org/pub/musicbrainz/data/fullexport
          echo "stamp=$STAMP" >> "$GITHUB_OUTPUT"
          echo "base=$BASE/$STAMP" >> "$GITHUB_OUTPUT"
          echo "Building from $STAMP"

      - name: Download export
        run: |
          set -euo pipefail
          UA="LidarrMetadataProvider/ci ( https://github.com/${{ github.repository }} )"
          mkdir -p dumps && cd dumps
          for f in mbdump.tar.bz2 mbdump-derived.tar.bz2 mbdump-cover-art-archive.tar.bz2 SHA256SUMS; do
            # A stalled transfer (not a clean failure, just no progress) would
            # otherwise burn the whole job budget; bound and retry it.
            curl -fsSL -A "$UA" --retry 3 --retry-delay 5 \
              --connect-timeout 30 --speed-limit 1024 --speed-time 120 \
              -O "${{ steps.export.outputs.base }}/$f"
          done
          ls -lh

      # A truncated download does not announce itself. It produces a dataset
      # quietly missing rows, which is worse than a build that fails.
      - name: Verify download
        run: ./bin/pipeline verify dumps/SHA256SUMS dumps/mbdump.tar.bz2 dumps/mbdump-derived.tar.bz2 dumps/mbdump-cover-art-archive.tar.bz2

      # Gathers artist images and biographies from Wikidata and Wikipedia. The
      # restored cache makes this a quick delta on most runs.
      - name: Enrich
        run: |
          set -euo pipefail
          ./bin/enrich -out enrich/artists.jsonl \
            -contact "https://github.com/${{ github.repository }}"

      - name: Build dataset
        # The measured peak is ~12.6 GB; the pipeline's own default soft limit
        # is 10 GB, which on a 16 GB runner would make the GC spin against a
        # target it cannot reach. Give it the same 13 GB used successfully off
        # CI, leaving headroom for the OS and the encoder pool.
        env:
          LMP_MEMORY_LIMIT_GB: "13"
        run: |
          set -euo pipefail
          # The || true must scope to grep alone (it returns 1 on no match);
          # under pipefail a bare trailing || true would also swallow a crash
          # or OOM of pipeline build itself and report the step green.
          /usr/bin/time -v ./bin/pipeline build \
            dumps/mbdump.tar.bz2 dumps/mbdump-derived.tar.bz2 dataset.db \
            dumps/mbdump-cover-art-archive.tar.bz2 enrich/artists.jsonl \
            2>&1 | tee build.log | { grep -Ev "^\s" || true; }
          grep -E "Maximum resident|Elapsed \(wall" build.log || true

      # The archives are the largest thing on disk and are finished with by
      # now. Removing them leaves room to compress and upload.
      - name: Free the archives
        run: rm -rf dumps && df -h / | tail -1

      # A full dataset exceeds a single GitHub release asset, so it is split
      # into parts with a manifest and a whole-file checksum. The server
      # rejoins and verifies them; see internal/dataset/fetch.go.
      - name: Package
        id: artifact
        run: |
          set -euo pipefail
          ./scripts/package-dataset.sh dataset.db release
          echo "size=$(du -h dataset.db | cut -f1)" >> "$GITHUB_OUTPUT"
          echo "sha=$(awk '{print $1}' release/dataset.db.sha256)" >> "$GITHUB_OUTPUT"
          echo "parts=$(wc -l < release/dataset.db.parts)" >> "$GITHUB_OUTPUT"

      # Proves the artifact opens and answers before anyone downloads it. A
      # dataset that builds but cannot be served is worse than a failed build,
      # because it looks like a success.
      - name: Smoke test the artifact
        run: |
          set -euo pipefail
          go build -o bin/server ./cmd/lidarr-metadata-provider
          # A floor check on the totals catches a build that emitted far too
          # few rows (a silently dropped table) even though it opens and serves.
          ./bin/pipeline stats dataset.db | tee stats.txt
          python3 - stats.txt <<'PY'
          import re, sys
          text = open(sys.argv[1]).read()
          nums = [int(x.replace(',', '')) for x in re.findall(r'([\d,]+) (?:artists|albums|tracks)', text)]
          artists, albums, tracks = (nums + [0, 0, 0])[:3]
          assert artists > 2_000_000, f"too few artists: {artists}"
          assert albums > 3_000_000, f"too few albums: {albums}"
          assert tracks > 40_000_000, f"too few tracks: {tracks}"
          print(f"floor check ok: {artists} artists, {albums} albums, {tracks} tracks")
          PY
          ./bin/server -dataset dataset.db -addr :5001 &
          for i in $(seq 30); do
            curl -fsS http://127.0.0.1:5001/ >/dev/null 2>&1 && break || sleep 1
          done
          curl -fsS http://127.0.0.1:5001/ | tee /dev/stderr | grep -q replication_date
          curl -fsS "http://127.0.0.1:5001/artist/b10bbbfc-cf9e-42e0-be17-e2c3e1d2600d" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print('Beatles albums:', len(d['Albums'])); sys.exit(0 if len(d['Albums']) > 500 else 1)"
          kill %1

      - name: Publish
        # inputs.publish is null on a schedule trigger, and GitHub coerces both
        # null and false to 0, so a bare `inputs.publish != false` is false for
        # every cron run and the dataset silently never publishes. Only treat it
        # as a veto when it was actually supplied, on a manual dispatch.
        if: github.event_name != 'workflow_dispatch' || inputs.publish != false
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ needs.check.outputs.tag }}"
          NOTES="$(cat <<EOF
          Built from the MusicBrainz full export \`${{ steps.export.outputs.stamp }}\`.
          Enriched with artist images and biographies from Wikidata and Wikipedia; see \`docs/DATA_SOURCES.md\` for provenance and licensing.

          | | |
          | --- | --- |
          | Size | ${{ steps.artifact.outputs.size }} |
          | Parts | ${{ steps.artifact.outputs.parts }} |
          | SHA-256 | \`${{ steps.artifact.outputs.sha }}\` |

          The container downloads, rejoins and verifies this automatically.
          The dataset is published in parts because it exceeds a single release
          asset; the server reads \`dataset.db.parts\` and fetches the rest.

          Prefer not to depend on these builds? The pipeline that produced
          this ships in the same image, see \`docs/BUILDING.md\`.
          EOF
          )"
          # Create the release if it is new; if it already exists (a corrected
          # same-day rebuild), refresh its title and notes too, not only its
          # assets, so a re-publish does not leave the superseded stamp showing.
          if ! gh release create "$TAG" --title "Dataset ${{ steps.export.outputs.stamp }}" --notes "$NOTES"; then
            gh release edit "$TAG" --title "Dataset ${{ steps.export.outputs.stamp }}" --notes "$NOTES"
          fi
          gh release upload "$TAG" release/dataset.db.part* release/dataset.db.parts release/dataset.db.sha256 --clobber

      - name: Build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 30
