name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Format
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "gofmt would change:"; echo "$unformatted"; exit 1
          fi

      - name: Vet
        run: go vet ./...

      # The race detector matters here specifically: the rate limiter is the
      # one piece where a concurrency bug means a MusicBrainz block rather
      # than a wrong answer.
      - name: Test
        run: go test -race ./...

      - name: Build
        run: go build ./...

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t lidarr-metadata-provider:ci .
      # The image is useless if it cannot refuse cleanly, and that path is
      # what a user hits first when their dataset has not downloaded yet.
      - name: Container refuses without a source
        run: |
          if docker run --rm lidarr-metadata-provider:ci -dataset /nonexistent.db; then
            echo "expected the container to refuse to start"; exit 1
          fi
